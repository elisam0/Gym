anyterminal_claude_code:
  responses_api_agents:
    anyterminal_agent:
      entrypoint: app.py
      domain: coding
      description: Terminal Bench run by claude-code natively inside the task container.
      value: Evaluate terminal-task capabilities on Terminal Bench with any Gym agent.

      agent_server_module: responses_api_agents.claude_code_agent.app
      agent_server_class: ClaudeCodeAgent
      agent_config_class: ClaudeCodeAgentConfig
      agent_kwargs:
        model: aws/anthropic/bedrock-claude-opus-4-8
        anthropic_api_key: ${anthropic_api_key}
        anthropic_base_url: https://inference-api.nvidia.com
        timeout: 12500 # Max task timeout in Terminal Bench is 12000 seconds
      # Path to pre-built Apptainer SIF files produced by prepare.py --sif-dir.
      # If omitted, Apptainer will pull docker:// images at runtime (requires internet).
      tb_sif_dir: null

      apptainer_memory_limit_mb: 32768
      concurrency: 6

      # Claude Code calls anthropic_base_url directly (no Gym model server).

      datasets:
        - name: example
          type: example
          jsonl_fpath: responses_api_agents/anyterminal_agent/data/terminal_bench.jsonl
