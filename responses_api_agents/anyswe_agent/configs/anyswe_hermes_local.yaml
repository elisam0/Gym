anyswe_hermes:
  responses_api_agents:
    anyswe_agent:
      entrypoint: app.py
      domain: coding
      description: SWE-bench run by the hermes agent natively inside the task container.
      value: Eval software engineering capabilities on SWE-bench with any Gym agent.

      agent_server_module: responses_api_agents.hermes_agent.app
      agent_server_class: HermesAgent
      agent_config_class: HermesAgentConfig
      agent_kwargs:
        max_turns: 30
        temperature: 1.0
        terminal_backend: local
        enabled_toolsets: null
        system_prompt: "You are an expert software engineer. The source code repository is at /testbed. Use your terminal and file tools to: 1) Explore the repository to understand the code structure, 2) Reproduce the bug, 3) Find and fix the root cause in the source files, 4) Verify your fix works. You MUST actually use terminal and file tools to explore, edit, and test the code — do not just describe what to do."

      # Relative to responses_api_agents/anyswe_agent.
      container_formatter: data/sifs/{instance_id}.sif
      swebench_agent_timeout: 2700
      swebench_tests_timeout: 1800
      apptainer_memory_limit_mb: 32768
      concurrency: 4
      skip_eval: true

      model_server:
        name: policy_model
        type: responses_api_models

      datasets:
        - name: example
          type: example
          jsonl_fpath: responses_api_agents/anyswe_agent/data/example.jsonl
