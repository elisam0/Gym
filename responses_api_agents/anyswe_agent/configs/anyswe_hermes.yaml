anyswe_hermes:
  responses_api_agents:
    anyswe_agent:
      entrypoint: app.py
      domain: coding
      description: SWE-bench run by the hermes agent natively inside the task container.
      value: Eval software engineering capabilities on SWE-bench with any Gym agent.

      agent_server_module: responses_api_agents.hermes_agent.app
      agent_server_class: HermesAgent
      agent_config_class: HermesAgentConfig
      agent_kwargs:
        max_turns: 100
        temperature: 1.0
        terminal_backend: local
        enabled_toolsets: null

      container_formatter: ???
      swebench_agent_timeout: 2700
      swebench_tests_timeout: 1800
      apptainer_memory_limit_mb: 32768
      concurrency: 64
      skip_eval: false

      model_server:
        name: policy_model
        type: responses_api_models

      datasets:
        - name: example
          type: example
          jsonl_fpath: responses_api_agents/anyswe_agent/data/example.jsonl
